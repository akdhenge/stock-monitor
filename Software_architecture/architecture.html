<html lang="en">
<head>

  <title>Stock Monitor — Architecture v3</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #020617; min-height: 100vh; padding: 2rem; color: white; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Header */
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 10px #22d3ee; }
    @keyframes pulse { 0%,100%{opacity:1; box-shadow: 0 0 10px #22d3ee;} 50%{opacity:0.5; box-shadow: 0 0 2px #22d3ee;} }
    h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.75rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 1rem; margin-left: 1.75rem; }

    /* Breadcrumb */
    .breadcrumb { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; font-size: 0.85rem; flex-wrap: wrap; background: rgba(15,23,42,0.6); padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid #1e293b; }
    .bc-item { color: #94a3b8; cursor: pointer; transition: color 0.2s; font-weight: 500; }
    .bc-item:hover { color: #22d3ee; }
    .bc-item.active { color: white; cursor: default; }
    .bc-sep { color: #475569; }

    /* Back button */
    .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(30,41,59,0.5); border: 1px solid #1e293b; border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 500; color: #cbd5e1; cursor: pointer; transition: all 0.2s; margin-bottom: 1.5rem; font-family: inherit; }
    .back-btn:hover { background: rgba(30,41,59,0.8); color: white; border-color: #334155; transform: translateX(-2px); }

    /* ── Interactive Diagram (Levels 0 & 1) ── */
    .diagram-wrap { width: 100%; overflow-x: auto; margin-top: 1rem; padding-bottom: 1rem; }
    .diagram-scene { position: relative; width: 1050px; height: 600px; background: rgba(15,23,42,0.4); border: 1px solid #1e293b; border-radius: 1rem; margin: 0 auto; backdrop-filter: blur(10px); background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; }
    .conn-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    
    .tile { position: absolute; width: 200px; cursor: pointer; z-index: 10;
      background: rgba(15,23,42,0.85); border: 1px solid #1e293b;
      border-top-width: 4px; border-radius: 0.75rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px); }
    .tile:hover { transform: translateY(-5px) scale(1.02); z-index: 20; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .tile-head { display: flex; align-items: center; gap: 10px; padding: 12px; }
    .tile-icon { font-size: 1.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .comp-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .tile-name { font-size: 0.95rem; font-weight: 700; color: #f8fafc; font-family: 'JetBrains Mono', monospace; line-height: 1.2; }
    .tile-body { padding: 0 12px 12px; font-size: 0.8rem; color: #94a3b8; line-height: 1.4; }
    
    .tile.central { width: 240px; background: rgba(15,23,42,0.95); box-shadow: 0 0 40px rgba(34,211,238,0.1); }
    .tile.central .tile-name { font-size: 1.1rem; }
    
    /* External system nodes for L1 */
    .tile.external { background: rgba(30,41,59,0.3); border: 2px dashed #475569; border-top: 2px dashed #475569; box-shadow: none; cursor: default; }
    .tile.external:hover { transform: none; box-shadow: none; }
    .tile.external .tile-name { color: #94a3b8; }
    .tile.external .tile-icon { filter: grayscale(100%); opacity: 0.7; }
    .tile.external.clickable-ext { cursor: pointer; }
    .tile.external.clickable-ext:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); border-color: #64748b; }
    .tile.external.clickable-ext .tile-name { color: #cbd5e1; }
    .tile.external.clickable-ext .tile-icon { filter: none; opacity: 1; }

    .path-line { stroke-dasharray: 6; animation: dash 20s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -200; } }
    
    /* ── Subsystem Header ── */
    .sys-header { background: rgba(15,23,42,0.6); border: 1px solid #1e293b; border-radius: 1rem; padding: 1.5rem 2rem; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 1.5rem; backdrop-filter: blur(10px); }
    .sys-icon  { font-size: 3rem; flex-shrink: 0; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
    .sys-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; font-family: 'JetBrains Mono', monospace; }
    .sys-desc  { font-size: 0.95rem; color: #94a3b8; }

    /* ── Level 2: Technical detail ── */
    .tech-panel { background: rgba(15,23,42,0.6); border: 1px solid #1e293b; border-radius: 1rem; padding: 2rem; max-width: 900px; backdrop-filter: blur(10px); }
    .tech-title    { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; font-family: 'JetBrains Mono', monospace; color: white; }
    .tech-subtitle { font-size: 0.95rem; color: #94a3b8; margin-bottom: 2rem; }
    .tech-sec      { margin-bottom: 1.5rem; }
    .tech-sec-lbl  { font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #64748b; margin-bottom: 0.75rem; }
    .tech-file     { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #22d3ee; background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.2); border-radius: 0.375rem; padding: 0.4rem 0.75rem; display: inline-block; }
    .tech-class    { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #a78bfa; background: rgba(167,139,250,0.1); padding: 0.2rem 0.5rem; border-radius: 0.25rem; }
    .tech-list     { list-style: none; }
    .tech-list li  { font-size: 0.9rem; color: #cbd5e1; padding: 0.5rem 0; border-bottom: 1px solid rgba(30,41,59,0.5); display: flex; align-items: flex-start; gap: 0.75rem; }
    .tech-list li:last-child { border-bottom: none; }
    .tech-list li::before { content: '▹'; color: #38bdf8; font-weight: bold; flex-shrink: 0; margin-top: 0.1rem; }
    .tech-signal { color: #34d399; font-family: 'JetBrains Mono', monospace; background: rgba(52,211,153,0.1); padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.85rem; }

    /* Footer */
    .footer { text-align: center; margin-top: 3rem; color: #475569; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; padding-top: 1rem; border-top: 1px dashed #1e293b; }

    /* Fade-in */
    .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>

// ─────────────────────────────────────
// RENDER LOGIC
// ─────────────────────────────────────
let ST = { level:0, sub:null, comp:null };

function go(level, sub, comp){
  ST = { level, sub:sub||ST.sub, comp:comp||null };
  render();
}

function render(){
  const bc = document.getElementById('bc');
  const crumbs = [{ label:'System Overview', level:0 }];
  if(ST.sub) crumbs.push({ label:SUBSYSTEMS[ST.sub].title, level:1 });
  if(ST.comp && TECH[ST.comp]) crumbs.push({ label:TECH[ST.comp].title, level:2 });
  
  if (crumbs.length === 1) {
    bc.style.display = 'none';
  } else {
    bc.style.display = 'flex';
    bc.innerHTML = crumbs.map((c,i)=>{
      const last = i===crumbs.length-1;
      return (i?'<span class="bc-sep">/</span>':'') +
        `<span class="bc-item${last?' active':''}" ${last?'':` onclick="go(${c.level})"`}>${c.label}</span>`;
    }).join('');
  }

  const el = document.getElementById('content');
  if(ST.level===0)      el.innerHTML = level0();
  else if(ST.level===1) el.innerHTML = level1();
  else                  el.innerHTML = level2();

  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
}

function getMarkerDefs() {
  const colors = ['22d3ee', '34d399', 'a78bfa', 'fb7185', 'fbbf24', 'fb923c'];
  return colors.map(c => `<marker id="a-${c}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#${c}"/></marker>`).join('');
}

function conn(id1, id2, color, label, reverseArrow = false, dashArray = null, customMap = null) {
  const layout = customMap || LAYOUT_L0;
  const p1 = layout[id1];
  const p2 = layout[id2];
  if (!p1 || !p2) return '';

  const w1 = p1.w || 200;
  const w2 = p2.w || 200;

  const cx1 = p1.x + (w1/2), cy1 = p1.y + 60;
  const cx2 = p2.x + (w2/2), cy2 = p2.y + 60;

  // Bezier control points with gentle perpendicular arc
  const dx = cx2 - cx1, dy = cy2 - cy1;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const offset = Math.min(50, dist * 0.22);
  const perpX = -dy/dist * offset;
  const perpY =  dx/dist * offset;
  const cpx1 = cx1 + dx/3 + perpX, cpy1 = cy1 + dy/3 + perpY;
  const cpx2 = cx2 - dx/3 + perpX, cpy2 = cy2 - dy/3 + perpY;

  // Midpoint at t=0.5 on cubic bezier
  const mx = 0.125*cx1 + 0.375*cpx1 + 0.375*cpx2 + 0.125*cx2;
  const my = 0.125*cy1 + 0.375*cpy1 + 0.375*cpy2 + 0.125*cy2;

  const strokeDash = dashArray ? `stroke-dasharray="${dashArray}" opacity="0.4"` : `stroke-dasharray="6" opacity="0.6" class="path-line"`;
  const colorHex = color.replace('#', '');

  const [sx, sy, ex, ey, cp1x, cp1y, cp2x, cp2y] = reverseArrow
    ? [cx2, cy2, cx1, cy1, cpx2, cpy2, cpx1, cpy1]
    : [cx1, cy1, cx2, cy2, cpx1, cpy1, cpx2, cpy2];

  const pathHtml = `<path d="M ${sx},${sy} C ${cp1x},${cp1y} ${cp2x},${cp2y} ${ex},${ey}" fill="none" stroke="${color}" stroke-width="2" ${strokeDash} marker-end="url(#a-${colorHex})"/>`;

  const labelW = label ? Math.max(80, label.length * 7 + 12) : 0;

  return `
    ${pathHtml}
    <circle cx="${mx}" cy="${my}" r="4" fill="${color}"/>
    ${label ? `<rect x="${mx - labelW/2}" y="${my - 18}" width="${labelW}" height="16" fill="rgba(15,23,42,0.8)" rx="4"/>
               <text x="${mx}" y="${my - 6}" fill="${color}" font-size="10" font-family="Inter,sans-serif" font-weight="600" text-anchor="middle">${label}</text>` : ''}
  `;
}

function level0(){
  const svgs = CONNS_L0.map(c => conn(c[0], c[1], c[2], c[3])).join('');

  const tiles = OVERVIEW.map(b => {
    const pos = LAYOUT_L0[b.id];
    let borderColor = '#334155';
    if(b.color==='cyan') borderColor='#22d3ee';
    if(b.color==='emerald') borderColor='#34d399';
    if(b.color==='violet') borderColor='#a78bfa';
    if(b.color==='rose') borderColor='#fb7185';
    if(b.color==='amber') borderColor='#fbbf24';
    if(b.color==='orange') borderColor='#fb923c';

    const isCenter = b.central === true;

    return `
      <div class="tile ${isCenter ? 'central' : ''}" style="left:${pos.x}px; top:${pos.y}px; border-top-color: ${borderColor};" onclick="go(1,'${b.id}')">
        <div class="tile-head">
          <div class="tile-icon">${b.icon}</div>
          <div class="tile-name">${b.title}</div>
        </div>
        <div class="tile-body">${isCenter ? b.summary : b.summary.substring(0, 75) + '...'}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="diagram-wrap">
      <div class="diagram-scene">
        <svg class="conn-svg">
          <defs>${getMarkerDefs()}</defs>
          ${svgs}
        </svg>
        ${tiles}
      </div>
    </div>
  `;
}

function level1(){
  const sysId = ST.sub;
  const sys = SUBSYSTEMS[sysId];
  const conf = LAYOUT_L1[sysId];

  // Merge internal and external nodes for path coordinates
  const mergedMap = {};
  for(const [k,v] of Object.entries(conf.nodes)) mergedMap[k] = v;
  conf.externals.forEach(ext => mergedMap[ext.id] = ext);

  const svgs = conf.connections.map(c => conn(c[0], c[1], c[2], c[3], c[4], c[5], mergedMap)).join('');

  const tiles = sys.components.map(c => {
    const pos = conf.nodes[c.id];
    if(!pos) return '';
    return `
      <div class="tile" style="left:${pos.x}px; top:${pos.y}px; border-top-color: ${c.color};" onclick="${c.detail ? `go(2,null,'${c.id}')` : ''}">
        <div class="tile-head" style="padding-bottom: 4px;">
          <div class="comp-dot" style="background:${c.color}"></div>
          <div class="tile-name">${c.title}</div>
        </div>
        <div class="tile-body" style="font-size: 0.75rem;">${c.desc.substring(0, 70)}...</div>
        ${c.detail ? `<div class="comp-hint" style="padding: 6px 12px; font-size: 0.65rem; color: #475569; border-top: 1px dashed #1e293b;">View details &rarr;</div>` : ''}
      </div>
    `;
  }).join('');

  const extNavMap = {
    ext_scanner: 'scanner', ext_desktop: 'desktop', ext_trader: 'trader',
    ext_ai: 'ai', ext_telegram: 'alerts', ext_web: 'web',
    ext_trigger: 'desktop', ext_ui: 'desktop', ext_scan: 'desktop',
    ext_ticks: 'desktop', ext_user: null, ext_web_pub: 'web'
  };

  const extTiles = conf.externals.map(ext => {
    const navSub = extNavMap[ext.id];
    const clickable = navSub !== undefined && navSub !== null;
    return `
      <div class="tile external${clickable ? ' clickable-ext' : ''}" style="left:${ext.x}px; top:${ext.y}px;" ${clickable ? `onclick="go(1,'${navSub}')"` : ''}>
        <div class="tile-head" style="padding-bottom: 4px;">
          <div class="tile-icon" style="font-size: 1.1rem;">${ext.icon}</div>
          <div class="tile-name">${ext.title}</div>
        </div>
        <div class="tile-body" style="font-size: 0.7rem; color: #64748b;">[External] ${ext.desc}</div>
        ${clickable ? `<div class="comp-hint" style="padding: 6px 12px; font-size: 0.65rem; color: #475569; border-top: 1px dashed #1e293b;">Navigate &rarr;</div>` : ''}
      </div>
    `;
  }).join('');

  return `
    <button class="back-btn" onclick="go(0)">&larr; Back to Overview</button>
    <div class="sys-header">
      <div class="sys-icon">${sys.icon}</div>
      <div>
        <div class="sys-title" style="color:${sys.color}">${sys.title}</div>
        <div class="sys-desc">${sys.desc}</div>
      </div>
    </div>
    
    <div class="diagram-wrap">
      <div class="diagram-scene">
        <svg class="conn-svg">
          <defs>${getMarkerDefs()}</defs>
          ${svgs}
        </svg>
        ${tiles}
        ${extTiles}
      </div>
    </div>
  `;
}

function level2(){
  const d = TECH[ST.comp];
  if(!d){ ST.level=1; return level1(); }
  const sigs = d.signals&&d.signals.length ? `
    <div class="tech-sec">
      <div class="tech-sec-lbl">Qt Signals / Callbacks</div>
      <ul class="tech-list">${d.signals.map(s=>`<li><span class="tech-signal">${s}</span></li>`).join('')}</ul>
    </div>` : '';
  return `
    <button class="back-btn" onclick="go(1)">&larr; Back to ${SUBSYSTEMS[ST.sub].title}</button>
    <div class="tech-panel">
      <div class="tech-title">${d.title}</div>
      <div class="tech-subtitle">${d.subtitle}</div>
      <div class="tech-sec">
        <div class="tech-sec-lbl">Source File</div>
        <div class="tech-file">${d.file}</div>
      </div>
      <div class="tech-sec">
        <div class="tech-sec-lbl">Class / Entry Point</div>
        <ul class="tech-list"><li><span class="tech-class">${d.cls}</span></li></ul>
      </div>
      <div class="tech-sec">
        <div class="tech-sec-lbl">Key Behaviors</div>
        <ul class="tech-list">${d.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
      </div>
      ${sigs}
    </div>`;
}
